version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: glados-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: glados
      POSTGRES_USER: glados
      POSTGRES_PASSWORD: glados
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: glados-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://glados:glados@postgres:5432/glados
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-glados-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-90d}
    depends_on:
      - postgres

  ai-service:
    image: python:3.11-slim
    container_name: glados-ai
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./ai-service:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
