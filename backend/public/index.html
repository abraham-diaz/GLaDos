<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>GLaDos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #111;
      border-bottom: 1px solid #f60;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      color: #f60;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    header span {
      color: #666;
      font-size: 0.8rem;
    }

    main {
      display: flex;
      gap: 2rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: #141414;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 1.5rem;
    }

    .panel-title {
      font-size: 0.85rem;
      color: #f60;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
    }

    /* Entry panel */
    .entry-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 3px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #f60;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #f60;
      color: #000;
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover { background: #ff8533; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .response-box {
      margin-top: 1rem;
      padding: 1rem;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 3px;
      font-size: 0.85rem;
      color: #aaa;
      min-height: 60px;
      display: none;
    }

    .response-box.visible { display: block; }

    .response-box .label {
      color: #f60;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    /* Concepts panel */
    .concepts-panel {
      flex: 1.2;
      display: flex;
      flex-direction: column;
    }

    .concepts-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 70vh;
      overflow-y: auto;
    }

    .concepts-list::-webkit-scrollbar { width: 6px; }
    .concepts-list::-webkit-scrollbar-track { background: #0a0a0a; }
    .concepts-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .concept-card {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 3px;
      padding: 1rem;
      transition: border-color 0.2s;
    }

    .concept-card:hover { border-color: #444; }

    .concept-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .concept-title {
      font-size: 0.95rem;
      color: #e0e0e0;
      font-weight: bold;
    }

    .badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .badge-state {
      background: #1a1a2e;
      color: #7b7bff;
    }

    .badge-state[data-state="cruda"] { background: #1a2e1a; color: #7bff7b; }
    .badge-state[data-state="recurrente"] { background: #2e2e1a; color: #ffff7b; }
    .badge-state[data-state="importante"] { background: #2e1a1a; color: #ff7b7b; }
    .badge-state[data-state="dormida"] { background: #1a1a1a; color: #666; }
    .badge-state[data-state="resuelta"] { background: #1a2e2e; color: #7bffff; }

    .badge-type {
      background: #222;
      color: #999;
    }

    .concept-summary {
      font-size: 0.8rem;
      color: #888;
      line-height: 1.5;
      margin-top: 0.5rem;
    }

    .concept-weight {
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.5rem;
    }

    .empty-state {
      color: #444;
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem;
    }

    .loading {
      color: #f60;
      font-size: 0.85rem;
      text-align: center;
      padding: 1rem;
    }

    @media (max-width: 768px) {
      main {
        flex-direction: column;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>GLaDos</h1>
    <span>Sistema de Gesti&oacute;n de Conocimiento Personal</span>
  </header>

  <main>
    <section class="panel entry-panel">
      <div class="panel-title">Nueva entrada</div>
      <textarea id="entryText" placeholder="Escribe una idea, error, aprendizaje o decisi&oacute;n..."></textarea>
      <button id="submitBtn" onclick="submitEntry()">Enviar</button>
      <div id="response" class="response-box">
        <div class="label">Resultado</div>
        <div id="responseContent"></div>
      </div>
    </section>

    <section class="panel concepts-panel">
      <div class="panel-title">Conceptos</div>
      <div id="conceptsList" class="concepts-list">
        <div class="loading">Cargando conceptos...</div>
      </div>
    </section>
  </main>

  <script>
    async function submitEntry() {
      const textarea = document.getElementById('entryText');
      const btn = document.getElementById('submitBtn');
      const responseBox = document.getElementById('response');
      const responseContent = document.getElementById('responseContent');
      const text = textarea.value.trim();

      if (!text) return;

      btn.disabled = true;
      btn.textContent = 'Procesando...';
      responseBox.classList.remove('visible');

      try {
        const res = await fetch('/api/entries', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ raw_text: text })
        });

        const data = await res.json();

        if (!res.ok) {
          responseContent.textContent = 'Error: ' + (data.error || res.statusText);
        } else {
          const concept = data.concept;
          if (concept) {
            responseContent.innerHTML =
              '<strong>' + escapeHtml(concept.summary || concept.title || 'Concepto procesado') + '</strong>' +
              ' <span class="badge badge-state" data-state="' + escapeHtml(concept.state) + '">' + escapeHtml(concept.state) + '</span>' +
              ' <span class="badge badge-type">' + escapeHtml(concept.concept_type || concept.type || '') + '</span>' +
              '<br><span style="color:#555">Peso: ' + (concept.weight || 1) + '</span>';
          } else {
            responseContent.textContent = 'Entrada registrada.';
          }
        }

        responseBox.classList.add('visible');
        textarea.value = '';
        loadConcepts();
      } catch (err) {
        responseContent.textContent = 'Error de conexi\u00f3n: ' + err.message;
        responseBox.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar';
      }
    }

    async function loadConcepts() {
      const list = document.getElementById('conceptsList');

      try {
        const res = await fetch('/api/concepts');
        const data = await res.json();
        const concepts = Array.isArray(data) ? data : data.concepts || [];

        if (concepts.length === 0) {
          list.innerHTML = '<div class="empty-state">No hay conceptos a&uacute;n. Env&iacute;a tu primera entrada.</div>';
          return;
        }

        list.innerHTML = concepts.map(function(c) {
          return '<div class="concept-card">' +
            '<div class="concept-header">' +
              '<span class="concept-title">' + escapeHtml(c.summary || c.title || 'Sin t\u00edtulo') + '</span>' +
              '<span class="badge badge-state" data-state="' + escapeHtml(c.state || '') + '">' + escapeHtml(c.state || '') + '</span>' +
              '<span class="badge badge-type">' + escapeHtml(c.concept_type || c.type || '') + '</span>' +
            '</div>' +
            (c.keywords ? '<div class="concept-summary">' + escapeHtml(c.keywords) + '</div>' : '') +
            '<div class="concept-weight">Peso: ' + (c.weight || 1) + '</div>' +
          '</div>';
        }).join('');
      } catch (err) {
        list.innerHTML = '<div class="empty-state">Error al cargar conceptos.</div>';
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('entryText').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        submitEntry();
      }
    });

    loadConcepts();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
