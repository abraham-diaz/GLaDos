<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles.css">
  <title>GLaDos</title>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>GLaDos</h2>
      <div class="form-group">
        <label for="loginUser">Usuario</label>
        <input type="text" id="loginUser" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="loginPass">Contrase&ntilde;a</label>
        <input type="password" id="loginPass" autocomplete="current-password">
      </div>
      <button id="loginBtn" onclick="doLogin()">Entrar</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appContainer" class="hidden">
  <header>
    <h1>GLaDos</h1>
    <span>Sistema de Gesti&oacute;n de Conocimiento Personal</span>
  </header>

  <!-- Chat Panel -->
  <div id="chatPanel" class="chat-panel hidden">
    <div class="chat-header">
      <span class="chat-header-title">Chat con GLaDOS</span>
      <button class="modal-close" onclick="toggleChat()">&times;</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-input-area">
      <textarea id="chatInput" class="chat-input" placeholder="Pregunta sobre tu conocimiento..." rows="2"></textarea>
      <button id="chatSendBtn" class="btn-chat-send" onclick="sendChatMessage()">Enviar</button>
    </div>
  </div>

  <main>
    <section class="panel entry-panel">
      <div class="panel-title">Nueva entrada</div>
      <textarea id="entryText" placeholder="Escribe una idea, error, aprendizaje o decisi&oacute;n..."></textarea>
      <button id="submitBtn" onclick="submitEntry()">Enviar</button>
      <div id="response" class="response-box">
        <div class="label">Resultado</div>
        <div id="responseContent"></div>
      </div>
    </section>

    <section class="panel concepts-panel">
      <div class="panel-title">Conceptos</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar sem&aacute;nticamente...">
        <button onclick="searchConcepts()">Buscar</button>
        <button class="btn-clear" onclick="clearSearch()">Limpiar</button>
      </div>
      <div id="searchInfo" class="search-info" style="display: none;"></div>
      <div class="filter-bar">
        <select id="filterState" onchange="applyFilters()">
          <option value="">Estado: Todos</option>
          <option value="cruda">Cruda</option>
          <option value="recurrente">Recurrente</option>
          <option value="importante">Importante</option>
          <option value="dormida">Dormida</option>
          <option value="resuelta">Resuelta</option>
        </select>
        <select id="filterType" onchange="applyFilters()">
          <option value="">Tipo: Todos</option>
          <option value="idea">Idea</option>
          <option value="error">Error</option>
          <option value="aprendizaje">Aprendizaje</option>
          <option value="decision">Decisi&oacute;n</option>
        </select>
      </div>
      <div id="conceptsList" class="concepts-list">
        <div class="loading">Cargando conceptos...</div>
      </div>
    </section>
  </main>

  <!-- Concept Detail Modal -->
  <div id="conceptModal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event)">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" onclick="closeConceptModal()">&times;</button>
      </div>
      <div id="modalBadges" class="modal-badges"></div>
      <div class="modal-section">
        <div class="modal-section-title">Resumen</div>
        <div id="modalSummary" class="modal-summary"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Evoluci&oacute;n de peso</div>
        <div id="modalChart"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Entries relacionadas</div>
        <div id="modalEntries" class="modal-entries"></div>
      </div>
    </div>
  </div>
  </div>

  <!-- Chat FAB -->
  <button id="chatFab" class="chat-fab" onclick="toggleChat()">
    <img src="/icon-192.svg" alt="GLaDOS" class="chat-fab-icon">
  </button>

  <script src="/app.js"></script>
</body>
</html>
